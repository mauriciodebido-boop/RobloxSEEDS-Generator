<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOXSEEDS Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        /* Minimalist scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #d1d5db; }
        
        body {
            background-color: #fafafa;
            color: #000000;
        }

        /* Fluid Modal animations */
        .modal-enter {
            animation: fluidFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .modal-exit {
            animation: fluidFadeOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fluidFadeIn {
            from { opacity: 0; transform: scale(0.96) translateY(10px); backdrop-filter: blur(0px); }
            to { opacity: 1; transform: scale(1) translateY(0); backdrop-filter: blur(8px); }
        }
        @keyframes fluidFadeOut {
            from { opacity: 1; transform: scale(1) translateY(0); backdrop-filter: blur(8px); }
            to { opacity: 0; transform: scale(0.96) translateY(10px); backdrop-filter: blur(0px); }
        }

        /* Staggered Seed Entrance */
        .seed-enter {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Toast animation */
        .toast-enter {
            animation: toastSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes toastSlide {
            from { opacity: 0; transform: translate(-50%, 20px) scale(0.95); }
            to { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }

        /* Clean inputs */
        .minimal-input {
            transition: all 0.3s ease;
        }
        .minimal-input:focus {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border-color: #000;
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative overflow-x-hidden antialiased selection:bg-black selection:text-white">

    <!-- Header -->
    <header class="w-full px-6 py-5 border-b border-gray-200/60 bg-white/80 backdrop-blur-md sticky top-0 z-30 flex justify-between items-center transition-all duration-300">
        <div class="flex items-center">
            <!-- Minimal Title: ROBLOX is lighter, SEEDS is bold and pure black -->
            <h1 class="text-2xl tracking-tighter select-none">
                <span class="font-medium text-gray-400">ROBLOX</span><span class="font-black text-black">SEEDS</span>
            </h1>
        </div>
        <button id="restart-btn" class="px-5 py-2.5 bg-white text-black text-sm font-medium rounded-full border border-gray-200 hover:border-black hover:bg-black hover:text-white transition-all duration-300 shadow-sm hover:shadow-md active:scale-95">
            New Batch
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow px-6 py-10 max-w-7xl mx-auto w-full">
        <div class="mb-10 flex flex-col items-center justify-center text-center">
            <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-3">Your generated seeds</h2>
            <p class="text-gray-500 max-w-md text-sm md:text-base">Click any seed card to copy it instantly to your clipboard. Used seeds will be automatically crossed out.</p>
        </div>
        
        <!-- Seeds Grid -->
        <div id="seed-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
            <!-- Seeds injected via JS -->
        </div>
    </main>

    <!-- Settings Modal Overlay -->
    <div id="settings-modal" class="fixed inset-0 bg-black/20 z-50 flex items-center justify-center p-4 modal-enter">
        <div class="bg-white rounded-[24px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] w-full max-w-md overflow-hidden border border-gray-100">
            
            <div class="p-8 pb-6 text-center">
                <h2 class="text-2xl font-bold tracking-tight mb-2">Configure Seeds</h2>
                <p class="text-sm text-gray-500">Set up your batch parameters.</p>
            </div>
            
            <div class="px-8 pb-8 space-y-6">
                <!-- Amount Input -->
                <div class="space-y-3">
                    <label for="seed-count" class="block text-sm font-medium text-gray-700">Amount to generate</label>
                    <input type="number" id="seed-count" value="20" min="1" max="1000" 
                        class="minimal-input w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3.5 text-black focus:outline-none focus:bg-white transition-all">
                    <p class="text-xs text-gray-400 font-medium">Limit: 1000 seeds per batch.</p>
                </div>

                <!-- Randomness Select -->
                <div class="space-y-3">
                    <label for="seed-randomness" class="block text-sm font-medium text-gray-700">Complexity</label>
                    <div class="relative">
                        <select id="seed-randomness" class="minimal-input w-full bg-gray-50/50 border border-gray-200 rounded-xl px-4 py-3.5 text-black focus:outline-none focus:bg-white transition-all appearance-none cursor-pointer">
                            <option value="low">Low (Numbers: 0-9)</option>
                            <option value="medium">Medium (Letters: A-Z)</option>
                            <option value="high" selected>High (Alphanumeric)</option>
                            <option value="ultra">Ultra (Alphanumeric + Symbols)</option>
                        </select>
                        <!-- Custom Select Arrow -->
                        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="p-4 px-8 pb-8">
                <button id="generate-btn" class="w-full py-4 bg-black text-white font-medium rounded-xl hover:bg-gray-800 transition-all duration-300 transform active:scale-[0.98] shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Generate Now
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none flex flex-col items-center gap-3"></div>

    <script>
        // DOM Elements
        const modal = document.getElementById('settings-modal');
        const generateBtn = document.getElementById('generate-btn');
        const restartBtn = document.getElementById('restart-btn');
        const seedContainer = document.getElementById('seed-container');
        const seedCountInput = document.getElementById('seed-count');
        const seedRandomnessSelect = document.getElementById('seed-randomness');
        const toastContainer = document.getElementById('toast-container');

        // Character Pools for complexity levels
        const CHAR_POOLS = {
            low: "0123456789",
            medium: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
            high: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
            ultra: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*+"
        };

        // Initialize Events
        generateBtn.addEventListener('click', handleGenerate);
        restartBtn.addEventListener('click', showModal);

        seedCountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGenerate();
        });

        function showModal() {
            modal.classList.remove('hidden', 'modal-exit');
            modal.classList.add('modal-enter');
        }

        function hideModal() {
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-exit');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 400); // Matches the new fluid fade out duration
        }

        function handleGenerate() {
            let count = parseInt(seedCountInput.value);
            const randomnessLevel = seedRandomnessSelect.value;

            if (isNaN(count) || count < 1) count = 1;
            if (count > 1000) count = 1000;
            seedCountInput.value = count; 

            generateSeedsUI(count, randomnessLevel);
            hideModal();
        }

        function generateSingleSeed(poolName) {
            const chars = CHAR_POOLS[poolName] || CHAR_POOLS['high'];
            let seed = "RE-";
            
            // Format constraint: RE-XXXX-XXXX-XXXX-XXXX
            for (let block = 0; block < 4; block++) {
                for (let i = 0; i < 4; i++) {
                    const randomIndex = Math.floor(Math.random() * chars.length);
                    seed += chars[randomIndex];
                }
                if (block < 3) seed += "-";
            }
            return seed;
        }

        function generateSeedsUI(count, randomnessLevel) {
            seedContainer.innerHTML = ''; // Clear previous

            for (let i = 0; i < count; i++) {
                const seedString = generateSingleSeed(randomnessLevel);
                
                // Construct highly polished minimal card
                const seedCard = document.createElement('div');
                seedCard.className = `
                    seed-enter group relative bg-white border border-gray-200 p-6 rounded-2xl 
                    flex items-center justify-center cursor-pointer shadow-sm
                    hover:border-black hover:shadow-lg hover:-translate-y-1.5
                    transition-all duration-400 ease-out overflow-hidden
                `;
                
                // Stagger entrance animation based on index
                // Cap stagger at 20 elements so it doesn't take forever to load huge batches
                const staggerDelay = Math.min(i, 20) * 0.04;
                seedCard.style.animationDelay = `${staggerDelay}s`;
                
                const seedText = document.createElement('span');
                seedText.className = 'font-mono text-[15px] sm:text-base font-medium tracking-widest text-gray-700 group-hover:text-black transition-colors duration-300';
                seedText.textContent = seedString;

                seedCard.addEventListener('click', () => {
                    copyToClipboard(seedString);
                    markAsTested(seedCard, seedText);
                    showToast("Copied to clipboard");
                });

                seedCard.appendChild(seedText);
                seedContainer.appendChild(seedCard);
            }
        }

        function copyToClipboard(text) {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            tempInput.style.position = "absolute";
            tempInput.style.left = "-9999px";
            tempInput.style.top = "0px";
            document.body.appendChild(tempInput);
            tempInput.select();
            
            try { document.execCommand("copy"); } 
            catch (err) { console.error("Copy failed: ", err); }
            
            document.body.removeChild(tempInput);
        }

        function markAsTested(cardElement, textElement) {
            // Apply visual strike-through
            textElement.classList.add('line-through', 'text-gray-300');
            textElement.classList.remove('group-hover:text-black', 'text-gray-700');
            
            // Dim and flatten the card
            cardElement.classList.add('opacity-50', 'border-gray-100', 'bg-gray-50/50', 'scale-[0.98]');
            cardElement.classList.remove('hover:border-black', 'hover:shadow-lg', 'hover:-translate-y-1.5', 'cursor-pointer', 'shadow-sm');
            
            // Disable further clicks
            cardElement.style.pointerEvents = 'none';
        }

        function showToast(message) {
            const toast = document.createElement('div');
            // Minimal black pill toast
            toast.className = 'bg-black text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 toast-enter text-sm font-medium tracking-wide';
            
            toast.innerHTML = `
                <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                ${message}
            `;
            
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 15px) scale(0.95)';
                toast.style.transition = 'all 0.4s cubic-bezier(0.16, 1, 0.3, 1)';
                setTimeout(() => {
                    if(toast.parentElement) toastContainer.removeChild(toast);
                }, 400);
            }, 2000);
        }
    </script>
</body>
</html>
