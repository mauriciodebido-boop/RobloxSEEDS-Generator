<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RobloxSeeds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        ios: {
                            bg: '#f2f2f7',
                            card: 'rgba(255, 255, 255, 0.65)',
                            text: '#1c1c1e',
                            muted: '#8e8e93',
                            blue: '#007aff',
                            red: '#ff3b30',
                            green: '#34c759',
                            separator: 'rgba(60, 60, 67, 0.12)'
                        }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.1)',
                        'ios': 'cubic-bezier(0.32, 0.72, 0, 1)'
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for a native app feel */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        body {
            background-color: #f2f2f7;
            color: #1c1c1e;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* Zoomblock constraint */
            touch-action: pan-x pan-y;
        }

        /* Prevent input zoom on iOS */
        input, textarea, select {
            font-size: 16px !important;
        }

        /* Animated Mesh Gradient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: #f2f2f7;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 60vw; height: 60vw; background: #e0e0e0; top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 50vw; height: 50vw; background: #ffffff; bottom: 10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 70vw; height: 70vw; background: #eaebed; top: 40%; left: 30%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.05); }
            100% { transform: translate(-5%, 10%) scale(0.95); }
        }

        /* iOS Glassmorphism Card */
        .ios-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 24px -6px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
            border-radius: 24px;
        }
        .ios-card:active {
            transform: scale(0.96);
            transition: transform 0.1s cubic-bezier(0.32, 0.72, 0, 1);
            background: rgba(255, 255, 255, 0.5);
        }

        /* Context Menu Styles */
        .ios-context-menu {
            background: rgba(250, 250, 250, 0.85);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 0.5px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 0.5px rgba(0, 0, 0, 0.05);
            border-radius: 18px;
            overflow: hidden;
            transform-origin: center;
        }

        /* Dynamic Island Toast */
        .dynamic-island {
            background: #000;
            color: #fff;
            border-radius: 999px;
            padding: 12px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.3px;
        }

        /* Animations */
        .animate-spring-up { animation: springUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.05) forwards; opacity: 0; }
        @keyframes springUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-fade-out { animation: fadeOut 0.3s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); pointer-events: none; }
        }

        /* Input styling */
        .ios-input {
            background: rgba(118, 118, 128, 0.12);
            color: #1c1c1e;
            transition: all 0.2s ease;
            -webkit-user-select: text;
            user-select: text;
        }
        .ios-input:focus {
            background: rgba(118, 118, 128, 0.18);
            outline: none;
        }

        /* --- NEW MODIFIER STYLES --- */
        .ios-toggle {
            appearance: none;
            width: 51px;
            height: 31px;
            background: rgba(120, 120, 128, 0.16);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            outline: none;
            transition: background 0.3s ease;
        }
        .ios-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 27px;
            height: 27px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15), 0 1px 1px rgba(0,0,0,0.16), 0 3px 1px rgba(0,0,0,0.1);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .ios-toggle:checked { background: #34c759; }
        .ios-toggle:checked::after { transform: translateX(20px); }

        .ios-slider {
            appearance: none;
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(120, 120, 128, 0.2);
            outline: none;
        }
        .ios-slider::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 4px rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .ios-slider::-webkit-slider-thumb:active { transform: scale(1.1); }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col relative overflow-x-hidden antialiased pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)] pl-[env(safe-area-inset-left)] pr-[env(safe-area-inset-right)]">

    <!-- Ambient iOS Background -->
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Floating Navbar -->
    <header class="w-full px-4 sm:px-8 py-4 sticky top-0 z-30 flex justify-center transition-all duration-300">
        <div class="bg-white/60 backdrop-blur-3xl border border-white/50 shadow-sm rounded-full px-5 py-3 w-full max-w-6xl flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-gray-900 to-gray-600 text-white flex items-center justify-center font-bold text-lg shadow-md">
                    R
                </div>
                <h1 class="text-xl font-bold tracking-tight select-none hidden sm:block">
                    RobloxSeeds
                </h1>
            </div>
            <div class="flex gap-2">
                <button id="export-btn" class="p-2 sm:px-4 sm:py-2 bg-ios-bg/50 hover:bg-ios-bg text-ios-blue text-sm font-semibold rounded-full transition-all duration-200 active:scale-95 flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="hidden sm:inline">Export</span>
                </button>
                <button id="restart-btn" class="px-5 py-2 bg-ios-blue text-white text-sm font-semibold rounded-full shadow-[0_4px_12px_rgba(0,122,255,0.3)] hover:opacity-90 transition-all duration-200 active:scale-95 flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    New Batch
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow px-4 sm:px-8 py-8 sm:py-16 max-w-6xl mx-auto w-full">
        <div class="mb-12 flex flex-col items-center justify-center text-center px-4">
            <h2 class="text-4xl sm:text-6xl font-bold tracking-tight mb-4 text-ios-text" style="letter-spacing: -0.04em;">Your Batch</h2>
            <p class="text-ios-muted max-w-md text-base sm:text-lg font-medium leading-relaxed">
                Tap to copy a seed instantly. <br class="hidden sm:block"/>
                <span class="text-ios-text">Long-press</span> or <span class="text-ios-text">right-click</span> for more options.
            </p>
        </div>
        
        <!-- Seeds Grid -->
        <div id="seed-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-4 sm:gap-6">
            <!-- Empty state -->
            <div class="col-span-full text-center py-24 text-ios-muted" id="empty-state">
                <div class="w-20 h-20 bg-black/5 rounded-full flex items-center justify-center mx-auto mb-5">
                    <svg class="w-10 h-10 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <p class="font-medium text-lg">No seeds generated.</p>
                <p class="text-sm mt-1">Tap "New Batch" to begin.</p>
            </div>
        </div>
    </main>

    <!-- Native-style Context Menu -->
    <div id="context-menu" class="fixed z-50 hidden ios-context-menu w-56 opacity-0 transition-opacity duration-200">
        <ul id="context-menu-list" class="flex flex-col text-[15px] font-medium text-ios-text">
            <!-- Injected -->
        </ul>
    </div>

    <!-- Settings Modal (iOS Bottom Sheet / Modal) -->
    <div id="settings-modal" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 hidden items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity duration-300 opacity-0">
        <div class="absolute inset-0" id="modal-backdrop"></div>
        
        <div class="bg-white/90 backdrop-blur-2xl rounded-t-[32px] sm:rounded-[32px] w-full max-w-md overflow-hidden relative z-10 shadow-2xl translate-y-full sm:translate-y-10 flex flex-col max-h-[90vh]" id="modal-content" style="transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);">
            
            <!-- Drag Indicator for Mobile -->
            <div class="w-full flex justify-center pt-3 pb-1 sm:hidden shrink-0">
                <div class="w-10 h-1.5 bg-gray-300 rounded-full"></div>
            </div>

            <div class="px-8 pt-6 pb-4 flex justify-between items-center border-b border-ios-separator shrink-0">
                <h2 class="text-2xl font-bold tracking-tight text-ios-text">Configure</h2>
                <button id="close-modal-btn" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center text-gray-500 active:scale-90 transition-transform">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-6 space-y-5 overflow-y-auto" style="-webkit-overflow-scrolling: touch;">
                
                <!-- Presets -->
                <div class="space-y-2">
                    <label class="block text-[13px] uppercase tracking-wider font-semibold text-ios-muted ml-2">Presets</label>
                    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                        <button class="preset-btn px-4 py-2 bg-ios-blue text-white rounded-full text-[15px] font-semibold whitespace-nowrap active:scale-95 transition-all shadow-md shadow-blue-500/20" data-preset="classic">Classic</button>
                        <button class="preset-btn px-4 py-2 bg-ios-bg/80 text-ios-text rounded-full text-[15px] font-medium whitespace-nowrap active:scale-95 transition-all" data-preset="short">Short</button>
                        <button class="preset-btn px-4 py-2 bg-ios-bg/80 text-ios-text rounded-full text-[15px] font-medium whitespace-nowrap active:scale-95 transition-all" data-preset="pin">PIN Code</button>
                        <button class="preset-btn px-4 py-2 bg-ios-bg/80 text-ios-text rounded-full text-[15px] font-medium whitespace-nowrap active:scale-95 transition-all" data-preset="complex">Complex</button>
                    </div>
                </div>

                <!-- Format String -->
                <div class="space-y-2 relative">
                    <label for="seed-format" class="block text-[13px] uppercase tracking-wider font-semibold text-ios-muted ml-2">Seed Format (* = Random)</label>
                    <input type="text" id="seed-format" value="RE-****-****-****" 
                        class="ios-input w-full rounded-2xl px-5 py-4 font-mono focus:outline-none focus:ring-2 focus:ring-ios-blue/30 text-center tracking-wide">
                    
                    <!-- Live Preview Box -->
                    <div class="mt-2 bg-ios-bg/40 rounded-xl p-3 flex flex-col items-center justify-center border border-ios-separator/30">
                        <span class="text-[11px] font-bold text-ios-muted uppercase tracking-wider mb-1">Live Preview</span>
                        <span id="seed-preview" class="font-mono font-semibold tracking-wide text-ios-text text-[15px] opacity-90 transition-opacity">
                            RE-A1B2-C3D4-E5F6
                        </span>
                    </div>
                </div>

                <!-- Advanced Compact Options Dropdown (Animated with Grid) -->
                <div class="bg-ios-bg/60 rounded-2xl border border-ios-separator/50 overflow-hidden">
                    <button id="modifier-toggle" class="w-full flex justify-between items-center p-4 font-semibold text-ios-text active:bg-black/5 transition-colors">
                        <span class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full bg-ios-blue/10 flex items-center justify-center text-ios-blue">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                            </div>
                            Modifiers
                        </span>
                        <span id="modifier-icon" class="text-ios-muted transition-transform duration-300 ease-ios">
                            <svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="20"><polyline points="6 9 12 15 18 9"/></svg>
                        </span>
                    </button>
                    
                    <div id="modifier-content" class="grid grid-rows-[0fr] transition-[grid-template-rows] duration-300 ease-ios">
                        <div class="overflow-hidden">
                            <div class="px-5 pb-5 pt-1 space-y-5 border-t border-ios-separator/50">
                                <!-- Toggles -->
                                <div class="flex items-center justify-between mt-2">
                                    <label class="text-[15px] font-medium text-ios-text">Uppercase (A-Z)</label>
                                    <input type="checkbox" id="opt-upper" checked class="ios-toggle">
                                </div>
                                <div class="flex items-center justify-between">
                                    <label class="text-[15px] font-medium text-ios-text">Lowercase (a-z)</label>
                                    <input type="checkbox" id="opt-lower" class="ios-toggle">
                                </div>
                                <div class="flex items-center justify-between">
                                    <label class="text-[15px] font-medium text-ios-text">Numbers (0-9)</label>
                                    <input type="checkbox" id="opt-num" checked class="ios-toggle">
                                </div>
                                
                                <!-- Probability Slider -->
                                <div class="pt-3 border-t border-ios-separator/50">
                                    <div class="flex justify-between text-xs text-ios-muted mb-3 font-semibold uppercase tracking-wider">
                                        <span id="lbl-letters">Letters: 50%</span>
                                        <span id="lbl-numbers">Numbers: 50%</span>
                                    </div>
                                    <input type="range" id="ratio-slider" min="0" max="100" value="50" class="w-full ios-slider">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Amount -->
                <div class="space-y-2 pt-2">
                    <label for="seed-count" class="block text-[13px] uppercase tracking-wider font-semibold text-ios-muted ml-2">Quantity</label>
                    <input type="number" id="seed-count" value="20" min="1" max="1000" 
                        class="ios-input w-full rounded-2xl px-5 py-4 font-semibold focus:outline-none focus:ring-2 focus:ring-ios-blue/30 text-lg">
                </div>

                <button id="generate-btn" class="w-full py-4 bg-ios-blue text-white text-lg font-semibold rounded-2xl active:bg-blue-600 active:scale-[0.98] transition-all duration-200 mt-2 shadow-lg shadow-blue-500/20">
                    Generate Seeds
                </button>
            </div>
            
            <!-- Safe Area Spacer for iOS Home Bar -->
            <div class="h-[env(safe-area-inset-bottom)] w-full shrink-0"></div>
        </div>
    </div>

    <!-- Dynamic Island Toast Container -->
    <div id="toast-container" class="fixed top-8 left-1/2 transform -translate-x-1/2 z-[60] pointer-events-none flex flex-col items-center gap-2"></div>

    <script>
        // Utilities & Haptics
        const haptic = {
            light: () => { if(navigator.vibrate) navigator.vibrate(10); },
            medium: () => { if(navigator.vibrate) navigator.vibrate(20); },
            heavy: () => { if(navigator.vibrate) navigator.vibrate([30, 50, 30]); },
            success: () => { if(navigator.vibrate) navigator.vibrate([10, 30, 20]); }
        };

        // DOM Elements
        const modal = document.getElementById('settings-modal');
        const modalContent = document.getElementById('modal-content');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const generateBtn = document.getElementById('generate-btn');
        const restartBtn = document.getElementById('restart-btn');
        const exportBtn = document.getElementById('export-btn');
        const seedContainer = document.getElementById('seed-container');
        const emptyState = document.getElementById('empty-state');
        const toastContainer = document.getElementById('toast-container');
        
        // Input Elements
        const seedCountInput = document.getElementById('seed-count');
        const seedFormatInput = document.getElementById('seed-format');
        const seedPreview = document.getElementById('seed-preview');
        const optUpper = document.getElementById('opt-upper');
        const optLower = document.getElementById('opt-lower');
        const optNum = document.getElementById('opt-num');
        const ratioSlider = document.getElementById('ratio-slider');
        const lblLetters = document.getElementById('lbl-letters');
        const lblNumbers = document.getElementById('lbl-numbers');
        const presetBtns = document.querySelectorAll('.preset-btn');
        
        const contextMenu = document.getElementById('context-menu');
        const contextMenuList = document.getElementById('context-menu-list');

        // Character pools
        const UPPER_CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const LOWER_CHARS = "abcdefghijklmnopqrstuvwxyz";
        const NUM_CHARS = "0123456789";

        // --- PRESETS CONFIGURATION ---
        const PRESETS = {
            classic: { format: 'RE-****-****-****', upper: true, lower: false, num: true, ratio: 50 },
            short: { format: '****-****', upper: true, lower: true, num: true, ratio: 60 },
            pin: { format: '******', upper: false, lower: false, num: true, ratio: 0 },
            complex: { format: '***-***-***-***-***', upper: true, lower: true, num: true, ratio: 75 }
        };

        // Initialize Accordion
        const modifierToggle = document.getElementById('modifier-toggle');
        const modifierContent = document.getElementById('modifier-content');
        const modifierIcon = document.getElementById('modifier-icon');
        
        modifierToggle.addEventListener('click', () => {
            const isOpen = modifierContent.style.gridTemplateRows === '1fr';
            modifierContent.style.gridTemplateRows = isOpen ? '0fr' : '1fr';
            modifierIcon.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(180deg)';
        });

        // Initialize Live Updates & UI
        function updateSliderLabels() {
            const lettersPercent = ratioSlider.value;
            lblLetters.textContent = `Letters: ${lettersPercent}%`;
            lblNumbers.textContent = `Numbers: ${100 - lettersPercent}%`;
        }

        function updateLivePreview() {
            // Add slight flicker effect to show it's updating
            seedPreview.style.opacity = '0.5';
            setTimeout(() => seedPreview.style.opacity = '0.9', 50);
            
            const previewText = generateSingleSeed();
            seedPreview.textContent = previewText || "Format is empty";
        }

        // Attach listeners for live preview
        ratioSlider.addEventListener('input', () => {
            updateSliderLabels();
            updateLivePreview();
        });
        seedFormatInput.addEventListener('input', updateLivePreview);
        optUpper.addEventListener('change', updateLivePreview);
        optLower.addEventListener('change', updateLivePreview);
        optNum.addEventListener('change', updateLivePreview);

        // Handle Preset Clicks
        presetBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                haptic.light();
                const presetKey = btn.dataset.preset;
                const config = PRESETS[presetKey];
                
                if (config) {
                    // Update active button styling
                    presetBtns.forEach(b => {
                        b.classList.remove('bg-ios-blue', 'text-white', 'shadow-md', 'shadow-blue-500/20');
                        b.classList.add('bg-ios-bg/80', 'text-ios-text', 'font-medium');
                        b.classList.remove('font-semibold');
                    });
                    btn.classList.add('bg-ios-blue', 'text-white', 'font-semibold', 'shadow-md', 'shadow-blue-500/20');
                    btn.classList.remove('bg-ios-bg/80', 'text-ios-text', 'font-medium');

                    // Apply config
                    seedFormatInput.value = config.format;
                    optUpper.checked = config.upper;
                    optLower.checked = config.lower;
                    optNum.checked = config.num;
                    ratioSlider.value = config.ratio;
                    
                    updateSliderLabels();
                    updateLivePreview();
                }
            });
        });

        // Event Listeners
        generateBtn.addEventListener('click', () => { haptic.heavy(); handleGenerate(); });
        restartBtn.addEventListener('click', () => { haptic.medium(); showModal(); updateLivePreview(); });
        closeModalBtn.addEventListener('click', hideModal);
        modalBackdrop.addEventListener('click', hideModal);
        exportBtn.addEventListener('click', () => { haptic.light(); exportSeeds(); });

        document.addEventListener('click', (e) => {
            if (!contextMenu.contains(e.target)) hideContextMenu();
        });
        window.addEventListener('scroll', hideContextMenu);
        window.addEventListener('resize', hideContextMenu);

        window.addEventListener('DOMContentLoaded', () => {
            handleGenerate(true);
            updateLivePreview();
        });

        // Modal Logic
        function showModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.classList.add('opacity-100');
                modalContent.style.transform = 'translateY(0)';
            }, 10);
        }

        function hideModal() {
            modal.classList.remove('opacity-100');
            modal.classList.add('opacity-0');
            modalContent.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            modalContent.style.transform = window.innerWidth < 640 ? 'translateY(100%)' : 'translateY(40px) scale(0.95)';
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }, 300);
        }

        // Generate Handler
        function handleGenerate(isInitial = false) {
            let count = parseInt(seedCountInput.value);
            if (isNaN(count) || count < 1) count = 1;
            if (count > 1000) count = 1000;
            seedCountInput.value = count; 

            generateSeedsUI(count);
            if(!isInitial) hideModal();
        }

        // Generate Single Seed with Advanced Parsing
        function generateSingleSeed() {
            const formatStr = seedFormatInput.value || "****";
            const useUpper = optUpper.checked;
            const useLower = optLower.checked;
            const useNum = optNum.checked;
            const letterProb = parseInt(ratioSlider.value) / 100;

            let seed = "";
            for (let i = 0; i < formatStr.length; i++) {
                if (formatStr[i] === '*') {
                    let wantLetter = Math.random() < letterProb;
                    let charPool = "";

                    // Safe fallbacks if settings contradict probability slider
                    if (wantLetter && !useUpper && !useLower) wantLetter = false;
                    if (!wantLetter && !useNum) wantLetter = true;

                    if (wantLetter) {
                        if (useUpper && useLower) {
                            charPool = Math.random() < 0.5 ? UPPER_CHARS : LOWER_CHARS;
                        } else if (useUpper) {
                            charPool = UPPER_CHARS;
                        } else if (useLower) {
                            charPool = LOWER_CHARS;
                        } else {
                            charPool = NUM_CHARS; // Absolute fallback
                        }
                    } else {
                        charPool = useNum ? NUM_CHARS : (useUpper ? UPPER_CHARS : (useLower ? LOWER_CHARS : "X"));
                    }

                    if (charPool === "") charPool = "X";
                    seed += charPool[Math.floor(Math.random() * charPool.length)];
                } else {
                    // Keep non-wildcard characters exactly as typed
                    seed += formatStr[i];
                }
            }
            return seed;
        }

        function generateSeedsUI(count) {
            seedContainer.innerHTML = ''; 

            for (let i = 0; i < count; i++) {
                const seedString = generateSingleSeed();
                
                const seedCard = document.createElement('div');
                seedCard.dataset.tested = "false";
                seedCard.dataset.seed = seedString;
                
                seedCard.className = `
                    animate-spring-up ios-card p-5 
                    flex items-center justify-between cursor-pointer transition-all duration-300
                `;
                
                const staggerDelay = Math.min(i, 30) * 0.04;
                seedCard.style.animationDelay = `${staggerDelay}s`;
                
                seedCard.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden w-full">
                        <div class="status-indicator shrink-0 w-[10px] h-[10px] rounded-full bg-ios-green shadow-[0_0_12px_rgba(52,199,89,0.5)] transition-all duration-300"></div>
                        <span class="seed-text truncate font-mono text-[15px] font-semibold tracking-wide text-ios-text transition-all duration-300">
                            ${seedString}
                        </span>
                    </div>
                `;

                seedCard.addEventListener('click', (e) => {
                    if (!contextMenu.classList.contains('hidden')) return;
                    
                    if (seedCard.dataset.tested === "true") {
                        haptic.light();
                        seedCard.style.transform = 'translateX(-5px)';
                        setTimeout(()=> seedCard.style.transform = 'translateX(5px)', 50);
                        setTimeout(()=> seedCard.style.transform = 'translateX(0)', 100);
                        return; 
                    }
                    haptic.success();
                    copyToClipboard(seedString);
                    markAsTested(seedCard);
                    showDynamicIsland("Copied", "success");
                });

                seedCard.addEventListener('contextmenu', (e) => {
                    e.preventDefault(); 
                    haptic.medium();
                    showContextMenu(e.clientX, e.clientY, seedCard);
                });

                let pressTimer;
                let isDragging = false;
                
                seedCard.addEventListener('touchstart', (e) => {
                    isDragging = false;
                    seedCard.style.transform = 'scale(0.96)'; 
                    pressTimer = setTimeout(() => {
                        haptic.heavy();
                        const touch = e.touches[0];
                        showContextMenu(touch.clientX, touch.clientY, seedCard);
                    }, 400); 
                }, {passive: true});

                seedCard.addEventListener('touchmove', () => {
                    isDragging = true;
                    seedCard.style.transform = '';
                    clearTimeout(pressTimer);
                }, {passive: true});

                seedCard.addEventListener('touchend', (e) => {
                    clearTimeout(pressTimer);
                    seedCard.style.transform = '';
                    if (!contextMenu.classList.contains('hidden') && !isDragging) {
                        e.preventDefault(); 
                    }
                });
                
                seedCard.addEventListener('touchcancel', () => {
                    clearTimeout(pressTimer);
                    seedCard.style.transform = '';
                });

                seedContainer.appendChild(seedCard);
            }
        }

        // --- CONTEXT MENU LOGIC ---
        function showContextMenu(x, y, card) {
            const isTested = card.dataset.tested === "true";
            contextMenuList.innerHTML = '';
            
            contextMenuList.appendChild(createContextMenuItem('Copy Seed', 'M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z', () => {
                haptic.success();
                copyToClipboard(card.dataset.seed);
                showDynamicIsland("Copied", "success");
                if(!isTested) markAsTested(card);
                hideContextMenu();
            }));

            if (isTested) {
                contextMenuList.appendChild(createContextMenuItem('Restore Seed', 'M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6', () => {
                    haptic.medium();
                    restoreCard(card);
                    hideContextMenu();
                }));
            }

            contextMenuList.appendChild(createContextMenuItem('Delete', 'M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16', () => {
                haptic.medium();
                deleteCard(card);
                hideContextMenu();
            }, true)); 

            contextMenu.classList.remove('hidden');
            setTimeout(() => {
                contextMenu.classList.remove('opacity-0');
                contextMenu.classList.add('opacity-100');
                contextMenu.style.transform = 'scale(1)';
            }, 10);
            
            const menuRect = contextMenu.getBoundingClientRect();
            let posX = x + 10;
            let posY = y + 10;
            
            if (posX + menuRect.width > window.innerWidth - 20) posX = window.innerWidth - menuRect.width - 20;
            if (posY + menuRect.height > window.innerHeight - 20) posY = window.innerHeight - menuRect.height - 20;
            
            contextMenu.style.left = `${posX}px`;
            contextMenu.style.top = `${posY}px`;
        }

        function hideContextMenu() {
            contextMenu.classList.remove('opacity-100');
            contextMenu.classList.add('opacity-0');
            contextMenu.style.transform = 'scale(0.95)';
            setTimeout(() => {
                contextMenu.classList.add('hidden');
            }, 200); 
        }

        function createContextMenuItem(text, iconPath, onClick, isDanger = false) {
            const li = document.createElement('li');
            const colorClass = isDanger ? 'text-ios-red' : 'text-ios-text';
            
            li.className = `px-5 py-3.5 flex items-center justify-between cursor-pointer active:bg-black/5 transition-colors ${colorClass} border-b border-ios-separator last:border-none`;
            li.innerHTML = `
                <span>${text}</span>
                <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${iconPath}"></path>
                </svg>
            `;
            li.addEventListener('click', onClick);
            return li;
        }

        function markAsTested(cardElement) {
            cardElement.dataset.tested = "true";
            const textElement = cardElement.querySelector('.seed-text');
            const dotElement = cardElement.querySelector('.status-indicator');
            
            textElement.classList.add('opacity-40');
            dotElement.classList.remove('bg-ios-green', 'shadow-[0_0_12px_rgba(52,199,89,0.5)]');
            dotElement.classList.add('bg-ios-muted');
            
            cardElement.classList.remove('backdrop-blur-24px');
            cardElement.style.background = 'rgba(255, 255, 255, 0.4)';
            cardElement.style.boxShadow = 'none';
            cardElement.style.borderColor = 'transparent';
        }

        function restoreCard(cardElement) {
            cardElement.dataset.tested = "false";
            const textElement = cardElement.querySelector('.seed-text');
            const dotElement = cardElement.querySelector('.status-indicator');
            
            textElement.classList.remove('opacity-40');
            dotElement.classList.add('bg-ios-green', 'shadow-[0_0_12px_rgba(52,199,89,0.5)]');
            dotElement.classList.remove('bg-ios-muted');
            
            cardElement.style.background = '';
            cardElement.style.boxShadow = '';
            cardElement.style.borderColor = '';
            cardElement.classList.add('backdrop-blur-24px');
        }

        function deleteCard(cardElement) {
            cardElement.classList.add('animate-fade-out');
            setTimeout(() => {
                if(cardElement.parentNode) cardElement.parentNode.removeChild(cardElement);
                if(seedContainer.children.length === 0 || 
                  (seedContainer.children.length === 1 && seedContainer.children[0].id === 'empty-state')) {
                    emptyState.style.display = 'block';
                    seedContainer.appendChild(emptyState);
                }
            }, 300); 
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
            } else {
                fallbackCopyText(text);
            }
        }

        function fallbackCopyText(text) {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            tempInput.style.position = "fixed";
            tempInput.style.opacity = "0";
            document.body.appendChild(tempInput);
            tempInput.select();
            try { document.execCommand("copy"); } catch (err) {}
            document.body.removeChild(tempInput);
        }

        // Dynamic Toast Banner
        function showDynamicIsland(message, type = "success") {
            const toast = document.createElement('div');
            
            const icon = type === "success" 
                ? `<svg class="w-5 h-5 text-ios-green" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-5 h-5 text-ios-red" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

            toast.className = 'dynamic-island shadow-xl transition-all duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] translate-y-[-100px] scale-50 opacity-0';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-[-100px]', 'scale-50', 'opacity-0');
                toast.classList.add('translate-y-0', 'scale-100', 'opacity-100');
            }, 10);

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'scale-100', 'opacity-100');
                toast.classList.add('translate-y-[-50px]', 'scale-75', 'opacity-0');
                setTimeout(() => {
                    if(toast.parentElement) toastContainer.removeChild(toast);
                }, 500);
            }, 2500);
        }

        function exportSeeds() {
            const seeds = Array.from(seedContainer.querySelectorAll('[data-seed]'))
                              .map(card => card.dataset.seed);
            
            if (seeds.length === 0) {
                showDynamicIsland("No seeds", "error");
                return;
            }

            const blob = new Blob([seeds.join('\n')], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `SEEDS_${new Date().getTime()}.txt`;
            a.click();
            window.URL.revokeObjectURL(url);
            showDynamicIsland("Exported", "success");
        }

        // --- SWIPE TO DISMISS LOGIC FOR MOBILE BOTTOM SHEET ---
        let sheetStartY = 0;
        let currentSheetY = 0;
        let isSheetDragging = false;

        modalContent.addEventListener('touchstart', (e) => {
            if (window.innerWidth >= 640) return; 
            
            // Allow native scrolling inside the container before trying to swipe the whole modal
            if (['INPUT', 'SELECT', 'BUTTON', 'SUMMARY', 'LABEL'].includes(e.target.tagName)) return;
            
            // Check if we are scrolling within a scrollable area
            const isScrollable = e.target.closest('.overflow-y-auto');
            if (isScrollable && isScrollable.scrollTop > 0) return;
            
            sheetStartY = e.touches[0].clientY;
            isSheetDragging = true;
            modalContent.style.transition = 'none'; 
        }, {passive: true});

        modalContent.addEventListener('touchmove', (e) => {
            if (!isSheetDragging || window.innerWidth >= 640) return;
            
            const deltaY = e.touches[0].clientY - sheetStartY;
            if (deltaY > 0) { 
                currentSheetY = deltaY;
                modalContent.style.transform = `translateY(${deltaY}px)`;
            }
        }, {passive: true});

        modalContent.addEventListener('touchend', () => {
            if (!isSheetDragging || window.innerWidth >= 640) return;
            isSheetDragging = false;
            
            modalContent.style.transition = 'transform 0.4s cubic-bezier(0.32, 0.72, 0, 1)';
            
            if (currentSheetY > 100) {
                hideModal();
            } else {
                modalContent.style.transform = 'translateY(0)';
            }
            currentSheetY = 0;
        });
    </script>
</body>
